  <script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
// 鋼筋混凝土計算機 — 配筋 / 檢核 / 數量

// 柱：尺寸＋每面支數 → ρg、淨間距、箍筋間距、保護層
// 依內政部《建築物混凝土結構設計規範》（112年版，自113.1.1生效）逐項檢核並註明條文；

const CSS = `

  .sc-figwrap{margin-top:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);
    padding:6px 6px 2px;overflow:hidden;}

  .sc-pill[data-s="bad"]{color:var(--bad);background:#F6E4E1;border-color:#E8CAC4;}

const fmt = (x, dp = 2) => {
  if (!isFinite(x)) return "∞";
  const r = Number(x.toFixed(dp));
  return r.toLocaleString("en-US", { maximumFractionDigits: dp });
};

function Pill({ s, children }) {
  return <span className="sc-pill" data-s={s}>{children}</span>;
}

// ── 鋼筋規格（CNS 560：標稱直徑 mm、斷面積 cm²、單位重 kg/m）──
const BARS = [
  { no: "D10", alt: "#3",  d: 9.53, A: 0.7133, w: 0.560 },
  { no: "D13", alt: "#4",  d: 12.7, A: 1.267,  w: 0.994 },
  { no: "D16", alt: "#5",  d: 15.9, A: 1.986,  w: 1.56  },
  { no: "D19", alt: "#6",  d: 19.1, A: 2.865,  w: 2.25  },
  { no: "D22", alt: "#7",  d: 22.2, A: 3.871,  w: 3.04  },
  { no: "D25", alt: "#8",  d: 25.4, A: 5.067,  w: 3.98  },
  { no: "D29", alt: "#9",  d: 28.7, A: 6.469,  w: 5.08  },
  { no: "D32", alt: "#10", d: 32.2, A: 8.143,  w: 6.39  },
  { no: "D36", alt: "#11", d: 35.8, A: 10.07,  w: 7.90  },
];
const barByNo = (no) => BARS.find((b) => b.no === no);

const FY = [
  { g: "SD280",  fy: 2800 },
  { g: "SD420W", fy: 4200 },
  { g: "SD550W", fy: 5500 },
];
const FC = [210, 280, 350, 420]; // kgf/cm²

// 曝露條件 → 最小保護層（mm），依 表20.5.1.3.1（場鑄非預力）
const EXPO = [
  { id: "in",   label: "室內（不接觸土壤）" },
  { id: "out",  label: "室外或接觸土壤" },
  { id: "soil", label: "直接澆置於土壤" },
];
function coverReq(expo, member, dbmm) {
  if (expo === "soil") return { v: 75, txt: "澆置於土壤並永久接觸：75 mm" };
  if (expo === "out")
    return dbmm >= 19.1
      ? { v: 50, txt: "曝露於氣候或接觸土壤，D19以上：50 mm" }
      : { v: 40, txt: "曝露於氣候或接觸土壤，D16以下：40 mm" };
  return member === "slab"
    ? { v: 20, txt: "不曝露，版・牆（D36以下）：20 mm" }
    : { v: 40, txt: "不曝露，梁・柱：40 mm" };
}

// 常用情境
const SCENARIOS = [
  { id: "slab1", label: "樓版 D13@20",       set: { member: "slab", bar: "D13", sS: "20", hS: "15", cover: "20", expo: "in",  use: "main" } },
  { id: "slab2", label: "屋頂溫度筋 D10@25", set: { member: "slab", bar: "D10", sS: "25", hS: "12", cover: "40", expo: "out", use: "temp" } },
  { id: "found", label: "基礎版 D16@15",     set: { member: "slab", bar: "D16", sS: "15", hS: "60", cover: "75", expo: "soil", use: "main" } },
  { id: "beam1", label: "梁 30×60・3-D22",   set: { member: "beam", bar: "D22", bS: "30", hbS: "60", nS: "3", cover: "40", expo: "in", stir: "D10", ssS: "15" } },
  { id: "beam2", label: "大梁 40×70・4-D25", set: { member: "beam", bar: "D25", bS: "40", hbS: "70", nS: "4", cover: "40", expo: "in", stir: "D13", ssS: "15" } },
  { id: "col1",  label: "柱 60×60・12-D25",  set: { member: "col",  bar: "D25", cbS: "60", chS: "60", nxS: "4", nyS: "4", cover: "40", expo: "in", stir: "D13", ssS: "10" } },
];

function RebarCalculator() {
  const [member, setMember] = useState("slab"); // slab / beam / col
  const [bar, setBar] = useState("D13");        // 主筋
  const [stir, setStir] = useState("D10");      // 箍筋
  const [fy, setFy] = useState(4200);
  const [fc, setFc] = useState(280);
  const [expo, setExpo] = useState("in");
  const [cover, setCover] = useState("20");     // mm

  // 版
  const [sS, setSS] = useState("20");   // 間距 cm
  const [hS, setHS] = useState("15");   // 版厚 cm
  const [use, setUse] = useState("main"); // main 主筋 / temp 溫度筋
  // 梁
  const [bS, setBS] = useState("30");
  const [hbS, setHbS] = useState("60");
  const [nS, setNS] = useState("3");    // 支數（單層）
  const [ssS, setSsS] = useState("15"); // 箍筋間距 cm
  // 柱
  const [cbS, setCbS] = useState("60");
  const [chS, setChS] = useState("60");
  const [nxS, setNxS] = useState("4");  // 寬向每面支數
  const [nyS, setNyS] = useState("4");  // 深向每面支數

  // 牌價
  const [steelPrice, setSteelPrice] = useState("20000"); // 元/噸
  const [concPrice, setConcPrice] = useState("3000");    // 元/m³

  const [copied, setCopied] = useState(false);

  const applyScenario = (sc) => {
    const v = sc.set;
    if (v.member) setMember(v.member);
    if (v.bar) setBar(v.bar);
    if (v.stir) setStir(v.stir);
    if (v.expo) setExpo(v.expo);
    if (v.cover) setCover(v.cover);
    if (v.sS) setSS(v.sS); if (v.hS) setHS(v.hS); if (v.use) setUse(v.use);
    if (v.bS) setBS(v.bS); if (v.hbS) setHbS(v.hbS); if (v.nS) setNS(v.nS); if (v.ssS) setSsS(v.ssS);
    if (v.cbS) setCbS(v.cbS); if (v.chS) setChS(v.chS); if (v.nxS) setNxS(v.nxS); if (v.nyS) setNyS(v.nyS);
  };

  const B = barByNo(bar);
  const ST = barByNo(stir);
  const cv = parseFloat(cover); // mm

  // ── 計算核心 ──
  const eff = useMemo(() => {
    if (!(cv >= 0)) return null;
    const ccm = cv / 10; // cm

    if (member === "slab") {
      const s = parseFloat(sS), h = parseFloat(hS);
      if (!(s > 0) || !(h > 0)) return null;
      const As = (B.A * 100) / s;             // cm²/m
      const rho = As / (100 * h);             // 對 Ag
      const d = h - ccm - B.d / 20;           // cm
      const wt = (B.w * 100) / s;             // kg/m²（單層單向）
      const conc = h / 100;                   // m³/m²
      const clear = s - B.d / 10;             // cm
      return { s, h, As, rho, d, wt, conc, clear };
    }

    if (member === "beam") {
      const b = parseFloat(bS), h = parseFloat(hbS), n = parseInt(nS, 10), ss = parseFloat(ssS);
      if (!(b > 0) || !(h > 0) || !(n >= 1)) return null;
      const d = h - ccm - ST.d / 10 - B.d / 20;   // cm
      const As = n * B.A;
      const rho = d > 0 ? As / (b * d) : NaN;
      const asMin = d > 0 ? (Math.max(0.8 * Math.sqrt(fc), 14) / fy) * b * d : NaN;
      const inner = b - 2 * ccm - 2 * ST.d / 10;  // 箍筋內寬 cm
      const clear = n >= 2 ? (inner - n * B.d / 10) / (n - 1) : null; // cm
      const wMain = n * B.w;                       // kg/m
      const Lst = 2 * (b + h) - 8 * ccm + 20;      // 箍筋單支長概估 cm（含彎鉤）
      const wStir = ss > 0 ? (Lst / 100) * ST.w * (100 / ss) : NaN; // kg/m
      const conc = (b * h) / 10000;                // m³/m
      return { b, h, n, ss, d, As, rho, asMin, clear, inner, wMain, wStir, conc };
    }

    // 柱
    const b = parseFloat(cbS), h = parseFloat(chS);
    const nx = parseInt(nxS, 10), ny = parseInt(nyS, 10), ss = parseFloat(ssS);
    if (!(b > 0) || !(h > 0) || !(nx >= 2) || !(ny >= 2)) return null;
    const n = 2 * (nx + ny) - 4;
    const As = n * B.A;
    const Ag = b * h;
    const rho = As / Ag;
    const spanX = b - 2 * cv / 10 - 2 * ST.d / 10 - B.d / 10; // 角筋心至心可用寬 cm
    const spanY = h - 2 * cv / 10 - 2 * ST.d / 10 - B.d / 10;
    const clearX = nx >= 2 ? spanX / (nx - 1) - B.d / 10 : null;
    const clearY = ny >= 2 ? spanY / (ny - 1) - B.d / 10 : null;
    const clear = Math.min(clearX, clearY);
    const wMain = n * B.w;
    const Lst = 2 * (b + h) - 8 * cv / 10 + 20;
    const wStir = ss > 0 ? (Lst / 100) * ST.w * (100 / ss) : NaN;
    const conc = (b * h) / 10000;
    return { b, h, nx, ny, n, ss, As, Ag, rho, clear, clearX, clearY, wMain, wStir, conc };
  }, [member, sS, hS, bS, hbS, nS, ssS, cbS, chS, nxS, nyS, bar, stir, fy, fc, cv]);

  const ok = eff && !eff.invalid;

  // ── 概估費用（依牌價）──
  const cost = useMemo(() => {
    if (!ok) return null;
    const sp = parseFloat(steelPrice), cp = parseFloat(concPrice); // sp: 元/噸　cp: 元/m³
    const steelKg = member === "slab" ? eff.wt : eff.wMain + (isFinite(eff.wStir) ? eff.wStir : 0);
    const concM3 = eff.conc;
    const steelCost = sp > 0 ? steelKg * (sp / 1000) : null;
    const concCost = cp > 0 ? concM3 * cp : null;
    if (steelCost === null && concCost === null) return null;
    return { steelCost: steelCost || 0, concCost: concCost || 0, total: (steelCost || 0) + (concCost || 0) };
  }, [ok, eff, member, steelPrice, concPrice]);

  // ── 規範檢核 ──
  const checks = useMemo(() => {
    if (!ok) return null;
    const list = [];
    const req = coverReq(expo, member, B.d);
    const coverCk = {
      name: "保護層厚度",
      src: "表20.5.1.3.1（場鑄非預力）",
      thr: req.txt,
      s: cv >= req.v ? "ok" : "bad",
      label: cv >= req.v ? "符合" : "不足",
      conv: `現設 ${fmt(cv, 0)} mm　需 ≧ ${req.v} mm`,
    };

    if (member === "slab") {
      const rhoMin = fy >= 4200 ? Math.max(0.0014, (0.0018 * 4200) / fy) : 0.0020;
      const asMin = rhoMin * 100 * eff.h;
      const sMaxByRho = B.A / (rhoMin * eff.h); // cm
      list.push({
        name: "最少鋼筋量（收縮溫度）",
        src: "§7.6.1.1、§24.4.3.2",
        thr: `ρ ≧ ${rhoMin.toFixed(4)}（fy=${fy} kgf/cm²）`,
        s: eff.As >= asMin ? "ok" : "bad",
        label: eff.As >= asMin ? "符合" : "不足",
        conv: `需 As,min ${fmt(asMin, 2)} cm²/m　現 ${fmt(eff.As, 2)} cm²/m\n此版厚 ${bar} 最大間距 ≒ @${fmt(sMaxByRho, 1)} cm`,
        note: fy < 4200 ? "SD280 從嚴取 0.0020（沿前版規範，較保守）。" : null,
      });
      const sMax = use === "main" ? Math.min(3 * eff.h, 45) : Math.min(5 * eff.h, 45);
      list.push({
        name: use === "main" ? "主筋最大間距" : "溫度筋最大間距",
        src: use === "main" ? "§7.7.2.3" : "§24.4.3.3",
        thr: use === "main" ? "≦ 3h 且 ≦ 45 cm" : "≦ 5h 且 ≦ 45 cm",
        s: eff.s <= sMax ? "ok" : "bad",
        label: eff.s <= sMax ? "符合" : "過大",
        conv: `此版厚上限 ${fmt(sMax, 1)} cm　現 @${fmt(eff.s, 1)} cm`,
      });
      list.push({
        name: "鋼筋最小淨間距",
        src: "§25.2.1",
        thr: "≧ 2.5 cm、≧ db、≧ 4/3 粗粒料粒徑",
        s: eff.clear >= Math.max(2.5, B.d / 10) ? "ok" : "bad",
        label: eff.clear >= Math.max(2.5, B.d / 10) ? "符合" : "過密",
        conv: `淨間距 ${fmt(eff.clear, 1)} cm　需 ≧ ${fmt(Math.max(2.5, B.d / 10), 1)} cm`,
        note: "粗粒料粒徑另依實際配比確認。",
      });
      list.push(coverCk);
      return list;
    }

    if (member === "beam") {
      list.push({
        name: "最少受拉鋼筋",
        src: "§9.6.1.2",
        thr: "As,min = max(0.8√f'c, 14)/fy · bw·d",
        s: eff.As >= eff.asMin ? "ok" : "bad",
        label: eff.As >= eff.asMin ? "符合" : "不足",
        conv: `需 ${fmt(eff.asMin, 2)} cm²　現 ${eff.n}-${bar} = ${fmt(eff.As, 2)} cm²`,
        note: "若 As 達需求量之 4/3 以上，得依 §9.6.1.3 免除。",
      });
      const reqClear = Math.max(2.5, B.d / 10);
      list.push({
        name: "主筋最小淨間距",
        src: "§25.2.1",
        thr: "≧ 2.5 cm、≧ db、≧ 4/3 粗粒料粒徑",
        s: eff.clear === null ? "info" : eff.clear >= reqClear ? "ok" : "bad",
        label: eff.clear === null ? "單支" : eff.clear >= reqClear ? "符合" : "過密",
        conv: eff.clear === null
          ? "單支主筋無間距檢核（受撓構材建議至少 2 支）"
          : `單層淨間距 ${fmt(eff.clear, 1)} cm　需 ≧ ${fmt(reqClear, 1)} cm`,
        note: eff.clear !== null && eff.clear < reqClear ? "可改多層排置（層間淨距 ≧ 2.5 cm，§25.2.2）或加大梁寬。" : null,
      });
      const ssMax = Math.min(eff.d / 2, 60);
      list.push({
        name: "箍筋間距（剪力筋）",
        src: "§9.7.6.2.2",
        thr: "≦ d/2 且 ≦ 60 cm",
        s: eff.ss > 0 ? (eff.ss <= ssMax ? "ok" : "bad") : "info",
        label: eff.ss > 0 ? (eff.ss <= ssMax ? "符合" : "過大") : "—",
        conv: eff.ss > 0 ? `上限 ${fmt(ssMax, 1)} cm　現 ${stir}@${fmt(eff.ss, 1)}` : "未輸入箍筋間距",
        note: "Vs 較大時上限減半為 d/4；耐震梁端圍束區另依 §18.3.4 加密。",
      });
      list.push(coverCk);
      return list;
    }

    // 柱
    const rhoS = eff.rho < 0.01 ? "bad" : eff.rho <= 0.06 ? "ok" : eff.rho <= 0.08 ? "warn" : "bad";
    list.push({
      name: "主筋鋼筋比 ρg",
      src: "§10.6.1.1（耐震柱另見 §18.4.3.1）",
      thr: "0.01 ≦ ρg ≦ 0.08（特殊抗彎矩構架柱 ≦ 0.06）",
      s: rhoS,
      label: eff.rho < 0.01 ? "不足" : eff.rho <= 0.06 ? "符合" : eff.rho <= 0.08 ? "超過耐震上限" : "過量",
      conv: `ρg = ${fmt(eff.rho * 100, 2)} %（${eff.n}-${bar}，As ${fmt(eff.As, 1)} cm²）`,
    });
    const reqClearC = Math.max(4, (1.5 * B.d) / 10);
    list.push({
      name: "主筋最小淨間距",
      src: "§25.2.3",
      thr: "≧ 4 cm、≧ 1.5db、≧ 4/3 粗粒料粒徑",
      s: eff.clear >= reqClearC ? "ok" : "bad",
      label: eff.clear >= reqClearC ? "符合" : "過密",
      conv: `寬向 ${fmt(eff.clearX, 1)}／深向 ${fmt(eff.clearY, 1)} cm　需 ≧ ${fmt(reqClearC, 1)} cm`,
    });
    const ssMaxC = Math.min((16 * B.d) / 10, (48 * ST.d) / 10, Math.min(eff.b, eff.h));
    list.push({
      name: "橫箍筋間距",
      src: "§25.7.2.1",
      thr: "≦ 16db、≦ 48d箍、≦ 柱最小邊寬",
      s: eff.ss > 0 ? (eff.ss <= ssMaxC ? "ok" : "bad") : "info",
      label: eff.ss > 0 ? (eff.ss <= ssMaxC ? "符合" : "過大") : "—",
      conv: eff.ss > 0 ? `上限 ${fmt(ssMaxC, 1)} cm　現 ${stir}@${fmt(eff.ss, 1)}` : "未輸入箍筋間距",
      note: "耐震柱圍束區間距另依 §18.4.5 從嚴（常為 10 cm 以下）。",
    });
    list.push(coverCk);
    return list;
  }, [ok, eff, member, expo, cv, fy, fc, bar, stir, use]);

  // ── 檢核紀錄 ──
  const handleCopy = async () => {
    if (!ok || !checks) return;
    const now = new Date();
    const ts = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const grade = FY.find((f) => f.fy === fy).g;
    let head = "";
    if (member === "slab") {
      head = `構材：版　厚 ${fmt(eff.h, 0)} cm　${use === "main" ? "主筋" : "溫度筋"} ${bar}@${fmt(eff.s, 0)}\n` +
        `材料：${grade}　保護層 ${fmt(cv, 0)} mm（${EXPO.find(e=>e.id===expo).label}）\n` +
        `結果：As ${fmt(eff.As, 2)} cm²/m　ρ ${fmt(eff.rho * 100, 3)} %　d ≒ ${fmt(eff.d, 1)} cm`;
    } else if (member === "beam") {
      head = `構材：梁 ${fmt(eff.b, 0)}×${fmt(eff.h, 0)} cm　主筋 ${eff.n}-${bar}　箍筋 ${stir}@${fmt(eff.ss, 0)}\n` +
        `材料：f'c ${fc} kgf/cm²　${grade}　保護層 ${fmt(cv, 0)} mm（${EXPO.find(e=>e.id===expo).label}）\n` +
        `結果：As ${fmt(eff.As, 2)} cm²　ρ ${fmt(eff.rho * 100, 2)} %　d ≒ ${fmt(eff.d, 1)} cm`;
    } else {
      head = `構材：柱 ${fmt(eff.b, 0)}×${fmt(eff.h, 0)} cm　主筋 ${eff.n}-${bar}（每面 ${eff.nx}×${eff.ny}）　箍筋 ${stir}@${fmt(eff.ss, 0)}\n` +
        `材料：f'c ${fc} kgf/cm²　${grade}　保護層 ${fmt(cv, 0)} mm（${EXPO.find(e=>e.id===expo).label}）\n` +
        `結果：As ${fmt(eff.As, 1)} cm²　ρg ${fmt(eff.rho * 100, 2)} %`;
    }
    const lines = checks.map((c) => {
      const mark = c.s === "ok" ? "✓" : c.s === "info" ? "·" : "✗";
      return `[${mark}] ${c.name}：${(c.conv || "").replace(/\n/g, "；")}　${c.src}`;
    });
    const txt =
      `── 配筋檢核紀錄 ──\n${ts}\n${head}\n\n${lines.join("\n")}\n\n` +
      `依內政部《建築物混凝土結構設計規範》（112年版，自113.1.1生效）；鋼筋規格依 CNS 560。\n` +
      `本紀錄僅供快速檢核，設計以簽證文件與最新條文為準。`;
    try {
      await navigator.clipboard.writeText(txt);
      setCopied(true);
      setTimeout(() => setCopied(false), 1600);
    } catch (e) {}
  };

  // ── 斷面圖幾何 ──
  const fig = useMemo(() => {
    if (!ok) return null;
    const W = 360, H = 250;
    if (member === "slab") {
      const showW = Math.max(eff.s * 3.2, 70); // cm
      const k = Math.min(300 / showW, 120 / eff.h);
      const w = showW * k, hh = eff.h * k;
      const x0 = (W - w) / 2, y0 = 150 - hh;
      const nB = Math.floor(showW / eff.s) + 1;
      const barR = Math.max((B.d / 10) * k / 2, 3);
      const by = y0 + hh - (cv / 10) * k - barR;
      const bars = [];
      const off = (showW - (nB - 1) * eff.s) / 2;
      for (let i = 0; i < nB; i++) bars.push(x0 + (off + i * eff.s) * k);
      return { type: "slab", W, H, k, x0, y0, w, hh, bars, barR, by };
    }
    const bw = member === "beam" ? eff.b : eff.b;
    const bh = member === "beam" ? eff.h : eff.h;
    const k = Math.min(190 / bw, 190 / bh);
    const w = bw * k, hh = bh * k;
    const x0 = 46 + (190 - w) / 2, y0 = 18 + (190 - hh) / 2;
    const cin = (cv / 10) * k;
    const stw = (ST.d / 10) * k;
    const barR = Math.max((B.d / 10) * k / 2, 3.2);
    let bars = [];
    if (member === "beam") {
      const innerL = x0 + cin + stw, innerR = x0 + w - cin - stw;
      const by = y0 + hh - cin - stw - barR;
      const n = eff.n;
      if (n === 1) bars = [{ x: (innerL + innerR) / 2, y: by }];
      else {
        const span = innerR - innerL - 2 * barR;
        for (let i = 0; i < n; i++) bars.push({ x: innerL + barR + (span * i) / (n - 1), y: by });
      }
    } else {
      const innerL = x0 + cin + stw + barR, innerR = x0 + w - cin - stw - barR;
      const innerT = y0 + cin + stw + barR, innerB = y0 + hh - cin - stw - barR;
      const { nx, ny } = eff;
      for (let i = 0; i < nx; i++) {
        const x = nx === 1 ? (innerL + innerR) / 2 : innerL + ((innerR - innerL) * i) / (nx - 1);
        bars.push({ x, y: innerT }); bars.push({ x, y: innerB });
      }
      for (let j = 1; j < ny - 1; j++) {
        const y = innerT + ((innerB - innerT) * j) / (ny - 1);
        bars.push({ x: innerL, y }); bars.push({ x: innerR, y });
      }
    }
    return { type: member, W, H, k, x0, y0, w, hh, cin, stw, barR, bars };
  }, [ok, eff, member, cv, bar, stir]);

  const grade = FY.find((f) => f.fy === fy).g;

  return (
    <div className="sc-wrap">
      <style>{CSS}</style>
      <div className="sc-shell">
        <div className="sc-head">
          <div className="sc-headL">
            <h1 className="sc-title">鋼筋混凝土計算機</h1>
            <span className="sc-sub">RC Rebar · 配筋 · 檢核 · 數量</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div className="sc-seg">
              <button data-on={member === "slab"} onClick={() => { setMember("slab"); if (cv > 40 && expo === "in") setCover("20"); }}>版</button>
              <button data-on={member === "beam"} onClick={() => { setMember("beam"); if (expo === "in" && cv < 40) setCover("40"); }}>梁</button>
              <button data-on={member === "col"} onClick={() => { setMember("col"); if (expo === "in" && cv < 40) setCover("40"); }}>柱</button>
            </div>
            <a className="sc-back" href="../">← 工具箱</a>
          </div>
        </div>
        <div className="sc-rule" />

        <div className="sc-scen">
          <span className="sc-scenLab">常用情境</span>
          {SCENARIOS.map((s) => (
            <button key={s.id} className="sc-chip sc-chip-scen" onClick={() => applyScenario(s)}>
              {s.label}
            </button>
          ))}
        </div>

        <div className="sc-grid">
          {/* 輸入 */}
          <div className="sc-panel">
            <p className="sc-eyebrow">輸入 · Input</p>

            <div className="sc-field">
              <div className="sc-label"><span>主筋號數</span><small>{B.alt} · ø{B.d}mm · {B.A}cm²</small></div>
              <div className="sc-presets" style={{ marginTop: 0 }}>
                {BARS.map((b) => (
                  <button key={b.no} className="sc-chip" data-on={bar === b.no}
                    onClick={() => setBar(b.no)} title={`${b.alt}　${b.d} mm　${b.w} kg/m`}>{b.no}</button>
                ))}
              </div>
            </div>

            {member === "slab" ? (
              <>
                <div className="sc-two">
                  <div className="sc-field">
                    <div className="sc-label"><span>間距</span><small>spacing</small></div>
                    <div className="sc-inputrow">
                      <span className="sc-pre">@</span>
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={sS} onChange={(e) => setSS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                  <div className="sc-field">
                    <div className="sc-label"><span>版厚</span><small>h</small></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={hS} onChange={(e) => setHS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                </div>
                <div className="sc-field">
                  <div className="sc-label"><span>鋼筋用途</span></div>
                  <div className="sc-seg">
                    <button data-on={use === "main"} onClick={() => setUse("main")}>主筋</button>
                    <button data-on={use === "temp"} onClick={() => setUse("temp")}>溫度筋</button>
                  </div>
                </div>
              </>
            ) : member === "beam" ? (
              <>
                <div className="sc-two">
                  <div className="sc-field">
                    <div className="sc-label"><span>梁寬 b</span></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={bS} onChange={(e) => setBS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                  <div className="sc-field">
                    <div className="sc-label"><span>梁深 h</span></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={hbS} onChange={(e) => setHbS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                </div>
                <div className="sc-two">
                  <div className="sc-field">
                    <div className="sc-label"><span>主筋支數</span><small>單層</small></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="numeric" min="1" step="1"
                        value={nS} onChange={(e) => setNS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">支</span>
                    </div>
                  </div>
                  <div className="sc-field">
                    <div className="sc-label"><span>箍筋</span></div>
                    <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
                      <div className="sc-seg">
                        <button data-on={stir === "D10"} onClick={() => setStir("D10")}>D10</button>
                        <button data-on={stir === "D13"} onClick={() => setStir("D13")}>D13</button>
                      </div>
                      <div className="sc-inputrow" style={{ flex: 1 }}>
                        <span className="sc-pre">@</span>
                        <input className="sc-input" style={{ fontSize: 16, padding: "8px 8px" }} type="number" inputMode="decimal"
                          value={ssS} onChange={(e) => setSsS(e.target.value)} placeholder="0" />
                        <span className="sc-unit">cm</span>
                      </div>
                    </div>
                  </div>
                </div>
              </>
            ) : (
              <>
                <div className="sc-two">
                  <div className="sc-field">
                    <div className="sc-label"><span>柱寬 b</span></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={cbS} onChange={(e) => setCbS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                  <div className="sc-field">
                    <div className="sc-label"><span>柱深 h</span></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="decimal"
                        value={chS} onChange={(e) => setChS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                </div>
                <div className="sc-two">
                  <div className="sc-field">
                    <div className="sc-label"><span>寬向每面</span><small>含角筋</small></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="numeric" min="2" step="1"
                        value={nxS} onChange={(e) => setNxS(e.target.value)} placeholder="2" />
                      <span className="sc-unit">支</span>
                    </div>
                  </div>
                  <div className="sc-field">
                    <div className="sc-label"><span>深向每面</span><small>含角筋</small></div>
                    <div className="sc-inputrow">
                      <input className="sc-input" type="number" inputMode="numeric" min="2" step="1"
                        value={nyS} onChange={(e) => setNyS(e.target.value)} placeholder="2" />
                      <span className="sc-unit">支</span>
                    </div>
                  </div>
                </div>
                <div className="sc-field">
                  <div className="sc-label"><span>箍筋</span></div>
                  <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
                    <div className="sc-seg">
                      <button data-on={stir === "D10"} onClick={() => setStir("D10")}>D10</button>
                      <button data-on={stir === "D13"} onClick={() => setStir("D13")}>D13</button>
                    </div>
                    <div className="sc-inputrow" style={{ flex: 1 }}>
                      <span className="sc-pre">@</span>
                      <input className="sc-input" style={{ fontSize: 16, padding: "8px 8px" }} type="number" inputMode="decimal"
                        value={ssS} onChange={(e) => setSsS(e.target.value)} placeholder="0" />
                      <span className="sc-unit">cm</span>
                    </div>
                  </div>
                </div>
              </>
            )}

            <div className="sc-field">
              <div className="sc-label"><span>保護層</span><small>clear cover</small></div>
              <div style={{ display: "flex", gap: 6, alignItems: "stretch", flexWrap: "wrap" }}>
                <div className="sc-inputrow" style={{ flex: "1 1 110px" }}>
                  <input className="sc-input" style={{ fontSize: 16, padding: "8px 10px" }} type="number" inputMode="decimal"
                    value={cover} onChange={(e) => setCover(e.target.value)} placeholder="0" />
                  <span className="sc-unit">mm</span>
                </div>
                <div className="sc-presets" style={{ marginTop: 0 }}>
                  {[20, 40, 50, 75].map((c) => (
                    <button key={c} className="sc-chip" data-on={cv === c}
                      onClick={() => setCover(String(c))}>{c}</button>
                  ))}
                </div>
              </div>
              <div className="sc-presets">
                {EXPO.map((e) => (
                  <button key={e.id} className="sc-chip" style={{ fontFamily: "var(--sans)" }}
                    data-on={expo === e.id} onClick={() => setExpo(e.id)}>{e.label}</button>
                ))}
              </div>
            </div>

            <div className="sc-two">
              <div className="sc-field">
                <div className="sc-label"><span>鋼筋 fy</span><small>{fy} kgf/cm²</small></div>
                <div className="sc-presets" style={{ marginTop: 0 }}>
                  {FY.map((f) => (
                    <button key={f.g} className="sc-chip" data-on={fy === f.fy}
                      onClick={() => setFy(f.fy)}>{f.g}</button>
                  ))}
                </div>
              </div>
              {member !== "slab" && (
                <div className="sc-field">
                  <div className="sc-label"><span>混凝土 f'c</span><small>kgf/cm²</small></div>
                  <div className="sc-presets" style={{ marginTop: 0 }}>
                    {FC.map((f) => (
                      <button key={f} className="sc-chip" data-on={fc === f}
                        onClick={() => setFc(f)}>{f}</button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {member === "beam" && eff && eff.n === 1 && (
              <p className="sc-err">受撓構材主筋建議至少 2 支（配合箍筋角隅）。</p>
            )}
            {member !== "slab" && eff && eff.d <= 0 && (
              <p className="sc-err">尺寸與保護層不合理，有效深度為負，請確認輸入。</p>
            )}
          </div>

          {/* 結果 + 斷面圖 */}
          <div className="sc-panel">
            <div className="sc-eyebrowRow">
              <p className="sc-eyebrow" style={{ margin: 0 }}>結果 · Output</p>
              <button className="sc-copy" data-done={copied} onClick={handleCopy} disabled={!ok}>
                {copied ? "已複製 ✓" : "複製檢核紀錄"}
              </button>
            </div>

            <div className="sc-readouts">
              <div className="sc-ro">
                <div className="k">鋼筋量 As</div>
                <div className="v">{ok ? fmt(eff.As, member === "col" ? 1 : 2) : "—"}</div>
                <div className="u">{member === "slab" ? "cm²/m" : "cm²"}</div>
                <div className="sub">{ok && member !== "slab" ? `${eff.n}-${bar}` : ok ? `${bar}@${fmt(eff.s, 0)}` : ""}</div>
              </div>
              <div className="sc-ro">
                <div className="k">{member === "col" ? "鋼筋比 ρg" : "鋼筋比 ρ"}</div>
                <div className="v">{ok && isFinite(eff.rho) ? fmt(eff.rho * 100, member === "slab" ? 3 : 2) : "—"}</div>
                <div className="u">%</div>
                <div className="sub">{member === "slab" ? "對全斷面 Ag" : member === "beam" ? "對 bw·d" : "對 Ag"}</div>
              </div>
              <div className="sc-ro">
                <div className="k">{member === "col" ? "總支數" : "有效深度 d"}</div>
                <div className="v">{ok ? (member === "col" ? eff.n : fmt(eff.d, 1)) : "—"}</div>
                <div className="u">{member === "col" ? "支" : "cm"}</div>
                <div className="sub">{member === "col" ? (ok ? `每面 ${eff.nx}×${eff.ny}` : "") : "估算值"}</div>
              </div>
            </div>

            {ok && (
              <div className="sc-result">
                <span className="lab">數量估算{member === "slab" ? "（每 m²，單層單向）" : "（每 m）"}</span>
                <span className="val">
                  {member === "slab" ? `${fmt(eff.wt, 1)} kg` : `${fmt(eff.wMain + (isFinite(eff.wStir) ? eff.wStir : 0), 1)} kg`}
                  <span className="sub2">
                    {member === "slab"
                      ? `混凝土 ${fmt(eff.conc, 3)} m³/m²`
                      : `主筋 ${fmt(eff.wMain, 1)}＋箍筋 ${isFinite(eff.wStir) ? fmt(eff.wStir, 1) : "—"} kg/m　混凝土 ${fmt(eff.conc, 3)} m³/m`}
                  </span>
                </span>
              </div>
            )}

            <div className="sc-figwrap">
              {fig ? (
                <svg className="sc-fig" viewBox={`0 0 ${fig.W} ${fig.H}`} role="img"
                  aria-label={`${member === "slab" ? "版" : member === "beam" ? "梁" : "柱"}斷面示意圖`}>
                  {fig.type === "slab" ? (
                    <g>
                      <rect className="conc" x={fig.x0} y={fig.y0} width={fig.w} height={fig.hh} />
                      <line className="cover" x1={fig.x0} x2={fig.x0 + fig.w}
                        y1={fig.y0 + fig.hh - (cv / 10) * fig.k} y2={fig.y0 + fig.hh - (cv / 10) * fig.k} />
                      {fig.bars.map((x, i) => (
                        <circle key={i} className="bar" cx={x} cy={fig.by} r={fig.barR} />
                      ))}
                      {/* 間距標註 */}
                      {fig.bars.length >= 2 && (
                        <g>
                          <line className="dimline" x1={fig.bars[0]} x2={fig.bars[1]} y1={fig.y0 - 12} y2={fig.y0 - 12} />
                          <line className="dimline" x1={fig.bars[0]} x2={fig.bars[0]} y1={fig.y0 - 17} y2={fig.y0 - 7} />
                          <line className="dimline" x1={fig.bars[1]} x2={fig.bars[1]} y1={fig.y0 - 17} y2={fig.y0 - 7} />
                          <text className="lbl" x={(fig.bars[0] + fig.bars[1]) / 2} y={fig.y0 - 18} textAnchor="middle">@{fmt(eff.s, 0)}</text>
                        </g>
                      )}
                      {/* 版厚 */}
                      <line className="dimline" x1={fig.x0 - 12} x2={fig.x0 - 12} y1={fig.y0} y2={fig.y0 + fig.hh} />
                      <text className="dim" x={fig.x0 - 18} y={fig.y0 + fig.hh / 2} textAnchor="end" dominantBaseline="middle">h {fmt(eff.h, 0)}</text>
                      {/* 保護層 */}
                      <line className="dimline" x1={fig.x0 + fig.w + 12} x2={fig.x0 + fig.w + 12}
                        y1={fig.y0 + fig.hh - (cv / 10) * fig.k} y2={fig.y0 + fig.hh} />
                      <text className="dim" x={fig.x0 + fig.w + 18} y={fig.y0 + fig.hh - ((cv / 10) * fig.k) / 2} dominantBaseline="middle">{fmt(cv, 0)}mm</text>
                      <text className="dim" x={fig.W / 2} y={fig.y0 + fig.hh + 26} textAnchor="middle">
                        版斷面（每 m 寬 {fmt(100 / eff.s, 1)} 支）
                      </text>
                    </g>
                  ) : (
                    <g>
                      <rect className="conc" x={fig.x0} y={fig.y0} width={fig.w} height={fig.hh} />
                      <rect className="stir" x={fig.x0 + fig.cin} y={fig.y0 + fig.cin}
                        width={fig.w - 2 * fig.cin} height={fig.hh - 2 * fig.cin}
                        rx={Math.max(fig.stw * 2, 4)} />
                      {fig.bars.map((b, i) => (
                        <circle key={i} className="bar" cx={b.x} cy={b.y} r={fig.barR} />
                      ))}
                      {/* b 標註 */}
                      <line className="dimline" x1={fig.x0} x2={fig.x0 + fig.w} y1={fig.y0 + fig.hh + 14} y2={fig.y0 + fig.hh + 14} />
                      <line className="dimline" x1={fig.x0} x2={fig.x0} y1={fig.y0 + fig.hh + 9} y2={fig.y0 + fig.hh + 19} />
                      <line className="dimline" x1={fig.x0 + fig.w} x2={fig.x0 + fig.w} y1={fig.y0 + fig.hh + 9} y2={fig.y0 + fig.hh + 19} />
                      <text className="dim" x={fig.x0 + fig.w / 2} y={fig.y0 + fig.hh + 30} textAnchor="middle">b {fmt(eff.b, 0)}</text>
                      {/* h 標註 */}
                      <line className="dimline" x1={fig.x0 - 14} x2={fig.x0 - 14} y1={fig.y0} y2={fig.y0 + fig.hh} />
                      <text className="dim" x={fig.x0 - 20} y={fig.y0 + fig.hh / 2} textAnchor="end" dominantBaseline="middle">h {fmt(eff.h, 0)}</text>
                      {/* 保護層 */}
                      <text className="dim" x={fig.x0 + fig.w + 8} y={fig.y0 + fig.cin + 4}>保護層 {fmt(cv, 0)}mm</text>
                      <text className="lbl" x={fig.x0 + fig.w + 8} y={fig.y0 + fig.hh - 6}>
                        {member === "beam" ? `${eff.n}-${bar}` : `${eff.n}-${bar}`}
                      </text>
                      <text className="dim" x={fig.x0 + fig.w + 8} y={fig.y0 + fig.hh + 10}>{stir}@{fmt(eff.ss, 0)}</text>
                    </g>
                  )}
                </svg>
              ) : (
                <svg className="sc-fig" viewBox="0 0 360 200" aria-hidden="true">
                  <line className="grid" x1="30" y1="160" x2="330" y2="160" />
                  <text x="180" y="95" textAnchor="middle" className="dim">輸入尺寸與配筋以顯示斷面</text>
                </svg>
              )}
            </div>
          </div>
        </div>

        {/* 牌價與概估費用 */}
        <div className="sc-panel" style={{ marginTop: 16 }}>
          <p className="sc-eyebrow">牌價 · 概估費用</p>
          <div className="sc-two">
            <div className="sc-field">
              <div className="sc-label"><span>鋼筋牌價</span><small>元/噸</small></div>
              <div className="sc-inputrow">
                <input className="sc-input" type="number" inputMode="decimal"
                  value={steelPrice} onChange={(e) => setSteelPrice(e.target.value)} placeholder="0" />
                <span className="sc-unit">元/噸</span>
              </div>
              <p className="sc-note" style={{ marginTop: 6 }}>
                參考網站：<a href="https://chart.metaltrade.tw/ste/ndomestic/" target="_blank" rel="noreferrer">鋼筋盤價（金屬期貨網）↗</a>
                　<a href="https://concords.moneydj.com/z/ze/zeq/zeqa_D0200960.djhtm" target="_blank" rel="noreferrer">鋼筋行情（MoneyDJ）↗</a>
              </p>
            </div>
            <div className="sc-field">
              <div className="sc-label"><span>混凝土牌價</span><small>元/m³</small></div>
              <div className="sc-inputrow">
                <input className="sc-input" type="number" inputMode="decimal"
                  value={concPrice} onChange={(e) => setConcPrice(e.target.value)} placeholder="0" />
                <span className="sc-unit">元/m³</span>
              </div>
              <p className="sc-note" style={{ marginTop: 6 }}>
                參考網站：<a href="https://concords.moneydj.com/z/ze/zeq/zeqa_D0110130.djhtm" target="_blank" rel="noreferrer">預拌混凝土行情（MoneyDJ）↗</a>
              </p>
            </div>
          </div>
          {ok && cost && (
            <div className="sc-result" style={{ marginTop: 14 }}>
              <span className="lab">概估費用{member === "slab" ? "（每 m²）" : "（每 m）"}</span>
              <span className="val">
                {fmt(cost.total, 0)} 元
                <span className="sub2">鋼筋 {fmt(cost.steelCost, 0)} 元＋混凝土 {fmt(cost.concCost, 0)} 元</span>
              </span>
            </div>
          )}
          <p className="sc-note" style={{ marginTop: 10 }}>牌價依市場即時波動，僅供概估參考，實際報價以供應商當日報價為準。</p>
        </div>

        {/* 規範檢核 */}
        <div className="sc-regs">
          <p className="sc-eyebrow">規範檢核 · Code Check（內政部《建築物混凝土結構設計規範》112年版）</p>
          <div className="sc-cards">
            {(checks || [null, null, null, null]).map((c, i) =>
              c ? (
                <div className="sc-card" key={i}>
                  <div className="top">
                    <div>
                      <div className="name">{c.name}</div>
                      <div className="src">{c.src}</div>
                    </div>
                    <Pill s={c.s}>{c.label}</Pill>
                  </div>
                  <div className="thr">{c.thr}</div>
                  {c.conv && <div className="sc-conv" style={{ whiteSpace: "pre-line" }}>{c.conv}</div>}
                  {c.note && <div className="sc-note">{c.note}</div>}
                </div>
              ) : (
                <div className="sc-card" key={i}>
                  <div className="top"><div className="name" style={{ color: "var(--ink-2)" }}>—</div><Pill s="info">—</Pill></div>
                </div>
              )
            )}
          </div>
        </div>

        <p className="sc-foot">
          鋼筋標稱直徑、斷面積與單位重依 CNS 560；材料強度採規範主列之公制單位（kgf/cm²）。
          檢核條號依內政部《建築物混凝土結構設計規範》（112.8.10 修正發布，自 113.1.1 生效）；
          淨間距檢核未計入粗粒料 4/3 倍粒徑條件，請依實際配比確認。
          箍筋重量為含彎鉤之概估值。本工具僅供快速檢核與紀錄，
          實際設計、耐震細部與查驗請以簽證文件、最新條文及主管機關認定為準。
        </p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RebarCalculator />);

  </script>
</body>
</html>
